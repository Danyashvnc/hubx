hosts:
  - localhost
  - hubx.local

loglevel: info

s2s_use_starttls: optional
s2s_access: s2s
certfiles:
  - /home/ejabberd/conf/fed.pem
ca_file: /home/ejabberd/conf/fed.pem

acl:
  admin:
    user:
      - "admin@localhost"
  local:
    user_regexp: ""
  loopback:
    ip:
      - 127.0.0.0/8
      - "::1/128"
  world:
    ip:
      - 0.0.0.0/0
      - "::/0"

access_rules:
  local:
    allow: local
  c2s:
    deny: blocked
    allow: all
  announce:
    allow: admin
  configure:
    allow: admin
  trusted_network:
    allow: loopback
  register_access:
    deny: all
  s2s:
    allow: all

api_permissions:
  "console commands":
    from:
      - ejabberd_ctl
    who: all
    what: "*"
  "admin access":
    who:
      access:
        - allow: loopback
        - allow: admin
      oauth:
        scope: "ejabberd:admin"
        access:
          - allow: loopback
          - allow: admin
    what:
      - register
      - unregister
      - check_password
      - check_account
      - registered_users
      - connected_users
      - connected_users_info
      - get_offline_count
      - get_room_affiliations
      - set_room_affiliation
      - status

shaper:
  normal:
    rate: 3000
    burst_size: 20000
  fast: 100000

shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages:
    5000: admin
    100: all
  c2s_shaper:
    none: admin
    normal: all
  s2s_shaper: fast

listen:
  -
    port: 5222
    ip: "::"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: c2s_shaper
    access: c2s
    starttls: false

  -
    port: 5280
    ip: "::"
    module: ejabberd_http
    request_handlers:
      /ws: ejabberd_http_ws
      /api: mod_http_api
      /admin: ejabberd_web_admin
      /oauth: ejabberd_oauth
      /upload: mod_http_upload
    tls: false

  -
    port: 5269
    ip: "::"
    module: ejabberd_s2s_in
    max_stanza_size: 524288

registration_timeout: infinity

modules:
  mod_adhoc: {}
  mod_admin_extra: {}
  mod_announce:
    access: announce
  mod_caps: {}
  mod_carboncopy: {}
  mod_client_state: {}
  mod_configure: {}
  mod_disco: {}
  mod_http_api: {}
  mod_http_upload:
    host: "upload.@HOST@"
    name: "HubX — загрузка файлов"
    docroot: "/home/ejabberd/database/upload"
    put_url: "http://@HOST@:5280/upload"
    get_url: "http://@HOST@:5280/upload"
    max_size: 26214400
    thumbnail: false
    custom_headers:
      "Access-Control-Allow-Origin": "*"
      "Access-Control-Allow-Methods": "GET,HEAD,PUT,OPTIONS"
      "Access-Control-Allow-Headers": "Content-Type"
  mod_last: {}
  mod_muc:
    host: "conference.@HOST@"
    access: all
    access_create: all
    access_persistent: all
    access_admin: configure
    default_room_options:
      persistent: true
      public: false
      public_list: false
      members_only: true
      moderated: false
      members_by_default: true
      anonymous: false
      allow_user_invites: false
  mod_muc_admin: {}
  mod_offline:
    access_max_user_messages: max_user_offline_messages
  mod_mam:
    default: always
    db_type: mnesia
    request_activates_archiving: false
  mod_ping: {}
  mod_privacy: {}
  mod_private: {}
  mod_register:
    access: register_access
    ip_access: all
    access_from: register_access
  mod_roster:
    versioning: true
  mod_shared_roster: {}
  mod_stream_mgmt:
    resend_on_timeout: if_offline
  mod_vcard: {}
  mod_version: {}
